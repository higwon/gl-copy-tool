name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-build:
    name: Windows exe build
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Check Python syntax
        run: python -m py_compile gl_input_copy_gui.py

      - name: Build executable
        run: python -m PyInstaller GLInputCopyTool.spec --noconfirm

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: GLInputCopyTool-${{ github.ref_name }}
          path: dist/GLInputCopyTool.exe
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: GL Input Copy Tool ${{ github.ref_name }}
          files: dist/GLInputCopyTool.exe
